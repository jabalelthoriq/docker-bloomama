

services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: php_laravel
    volumes:
      - ./src:/var/www
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: nginx_laravel
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - laravel

  mysql:
    image: mariadb:10.6
    container_name: mysql_laravel
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - laravel

networks:
  laravel: